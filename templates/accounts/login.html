{% extends 'base.html' %}
{% block title %}Connexion - ITmanager{% endblock %}
{% block content %}
<div style="max-width:360px; margin:72px auto 0;">
    <div style="text-align:center; margin-bottom:28px;">
        <div style="font-size:18px; font-weight:700; letter-spacing:-0.3px;">
            <span style="display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; margin-right:8px;"></span>ITmanager
        </div>
        <div style="font-size:13px; color:var(--text-dim); margin-top:4px;">
            Connectez-vous à votre espace
        </div>
    </div>
    <div class="panel">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn" style="width:100%; justify-content:center; margin-top:6px; padding:10px;">Se connecter</button>
        </form>
    </div>
</div>
{% endblock %}
