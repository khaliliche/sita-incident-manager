{% extends 'base.html' %}
{% block title %}Email envoyé - ITmanager{% endblock %}
{% block content %}
<div style="max-width:400px; margin:64px auto 0;">
    <h2>Email envoyé</h2>

        <p style="color:var(--text-dim); font-size:13.5px;">

{% endblock %}
