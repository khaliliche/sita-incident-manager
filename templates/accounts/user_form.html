{% extends 'base.html' %}
{% block title %}{{ mode|title }} utilisateur - ITmanager{% endblock %}
{% block content %}
<h2>{% if mode == 'creation' %}Créer un utilisateur{% else %}Modifier {{ utilisateur.username }}{% endif %}</h2>
<div class="panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Enregistrer</button>
    </form>
</div>
<p><a href="{% url 'accounts:user_list' %}" class="link">← Retour à la liste</a></p>
{% endblock %}
