{% extends 'base.html' %}
{% block title %}{{ titre }} - ITmanager{% endblock %}
{% block content %}
<h2>{{ titre }}</h2>
<div class="panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Enregistrer</button>
    </form>
</div>
<p><a href="{% url 'core:settings' %}" class="link">← Retour aux paramètres</a></p>
{% endblock %}
