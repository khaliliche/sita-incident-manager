{% extends 'base.html' %}
{% block title %}Nouveau ticket - ITmanager{% endblock %}
{% block content %}
<h2>Créer un ticket</h2>
<div class="panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Créer le ticket</button>
    </form>
</div>
<p><a href="{% url 'incidents:ticket_list' %}" class="link">← Retour aux tickets</a></p>
{% endblock %}
